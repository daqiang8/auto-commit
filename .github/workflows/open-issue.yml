name: every-second-issue-generator

on:
  schedule:
    - cron: "* * * * *"  # 毎分
  workflow_dispatch:

permissions:
  issues: write

jobs:
  spam_issues:
    runs-on: ubuntu-latest

    steps:
      - name: generate issues every second
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for i in {1..9999}
          do
            TIME=$(date -u +'%Y-%m-%d %H:%M:%S')

            TITLE="second issue #$i at $TIME"
            BODY="auto generated every second. index=$i time=$TIME"

            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$REPO/issues \
              -d "{
                \"title\": \"$TITLE\",
                \"body\": \"$BODY\"
              }"

            sleep 1
          done
        
